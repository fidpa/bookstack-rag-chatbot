name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    name: Python (ruff + black + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff black mypy
          pip install -r chatbot/requirements.txt

      - name: ruff
        run: ruff check chatbot scripts tests

      - name: black --check
        run: black --check chatbot scripts tests

      - name: mypy (non-strict)
        run: mypy --ignore-missing-imports chatbot || true

  shell:
    name: Shell (shellcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: scripts
          severity: warning

  yaml:
    name: YAML (yamllint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: yamllint
        run: |
          pipx install yamllint
          yamllint -d relaxed .
